services:
  db:
    image: pgvector/pgvector:pg16
    container_name: agrollm-pg
    environment:
      POSTGRES_USER: agro
      POSTGRES_PASSWORD: agro
      POSTGRES_DB: agrollm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agro -d agrollm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
